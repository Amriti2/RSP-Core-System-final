<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - RSP Core</title>

<link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.jpg') }}">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Outfit', sans-serif;
        background-color: #030712;
    }
    .bg-grid {
        background-size: 40px 40px;
        background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    }
    .glow-pulse {
        animation: pulse-glow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse-glow {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.05); }
    }
    @keyframes shimmer {
        100% { transform: translateX(100%); }
    }
</style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center relative overflow-hidden bg-grid">

<div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] bg-blue-600/30 rounded-full blur-[120px] pointer-events-none glow-pulse"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[600px] h-[600px] bg-cyan-500/20 rounded-full blur-[150px] pointer-events-none glow-pulse" style="animation-delay: 2s;"></div>

<div class="absolute top-6 left-6 z-50">
    <a href="/" class="group text-slate-400 hover:text-white transition-all flex items-center gap-3 text-xs uppercase tracking-[0.2em] font-bold bg-[#0f172a]/80 hover:bg-blue-600/20 px-5 py-3 rounded-xl border border-white/10 backdrop-blur-xl shadow-xl">
        <span class="group-hover:-translate-x-1 transition-transform">←</span> Return to Terminal
    </a>
</div>

<div class="relative z-10 w-full max-w-md p-8 mx-4 bg-[#0f172a]/80 backdrop-blur-2xl rounded-3xl border border-white/10 shadow-[0_0_40px_rgba(59,130,246,0.15)]">
    
    <div class="text-center mb-8">
        <div class="flex justify-center mb-6">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="w-20 h-20 rounded-2xl border border-blue-500/30 shadow-[0_0_20px_rgba(59,130,246,0.2)]">
        </div>
        
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 tracking-tight mb-2">Welcome Back</h1>
        <p class="text-slate-400 font-light">Authenticate to access RSP Core</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="mb-6 space-y-2">
            {% for category, message in messages %}
                <div class="px-4 py-3 rounded-xl text-sm font-medium border 
                    {% if category == 'error' or category == 'danger' %} bg-red-500/10 border-red-500/20 text-red-400 
                    {% else %} bg-blue-500/10 border-blue-500/20 text-blue-400 {% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form action="/login" method="POST" class="space-y-5">
        <div>
            <input type="text" name="username" placeholder="Username" required
                class="w-full px-5 py-4 bg-[#030712]/50 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all duration-300 shadow-inner">
        </div>
        
        <div>
            <input type="password" name="password" placeholder="Password" required
                class="w-full px-5 py-4 bg-[#030712]/50 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all duration-300 shadow-inner">
        </div>

        <button type="submit" class="w-full group relative px-8 py-4 mt-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold transition-all duration-300 overflow-hidden shadow-[0_0_20px_rgba(37,99,235,0.4)] hover:shadow-[0_0_40px_rgba(37,99,235,0.6)] hover:-translate-y-0.5">
            <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
            Initialize Login
        </button>
    </form>

    <div class="mt-8 text-center">
        <p class="text-slate-400 text-sm">
            Don’t have an account? 
            <a href="/signup" class="text-cyan-400 hover:text-cyan-300 font-semibold transition-colors hover:underline underline-offset-4">
                Sign Up
            </a>
        </p>
    </div>
</div>

</body>
</html>
